name: Daily Signal Collection

on:
  schedule:
    # Runs every day at 7:00 AM UTC (9:00 AM CET / 2:00 AM PST)
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      run_type:
        description: "Signal type to collect"
        required: false
        default: "full"
        type: choice
        options: [full, news, job_postings, job_changes]

jobs:
  collect-signals:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal collection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          THEIRSTACK_API_KEY: ${{ secrets.THEIRSTACK_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
        run: |
          python scripts/run_signals.py --type ${{ github.event.inputs.run_type || 'full' }}
